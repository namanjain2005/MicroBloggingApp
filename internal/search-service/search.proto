syntax = "proto3";

package search;


option go_package = "searchpb/";

service SearchService {
   rpc SearchUsers (SearchUsersRequest)
      returns (SearchUsersResponse);

 
  rpc SearchPosts (SearchPostsRequest)
      returns (SearchPostsResponse);


  rpc Search (SearchRequest)
      returns (SearchResponse);
}



message Pagination {
  uint32 limit  = 1;
  uint32 offset = 2;
}

message SearchMetadata {
  uint64 total = 1;
}


message SearchUsersRequest {
  string query = 1;
  Pagination pagination = 2;
}

message User {
  string user_id  = 1;
  string username = 2;
  string email    = 3;
}

message SearchUsersResponse {
  SearchMetadata meta = 1;
  repeated User users = 2;
}



message SearchPostsRequest {
  string query = 1;
  Pagination pagination = 2;
}

message Post {
  string post_id   = 1;
  string author_id = 2;
  string content   = 3;
  repeated string hashtags = 4;
  int64 created_at = 5; // unix timestamp
}

message SearchPostsResponse {
  SearchMetadata meta = 1;
  repeated Post posts = 2;
}


enum SearchType {
  SEARCH_TYPE_UNSPECIFIED = 0;
  SEARCH_TYPE_USERS = 1;
  SEARCH_TYPE_POSTS = 2;
}

message SearchRequest {
  string query = 1;
  Pagination pagination = 2;
  repeated SearchType types = 3; // users, posts, or both
}

message SearchResult {
  oneof result {
    User user = 1;
    Post post = 2;
  }
}

message SearchResponse {
  SearchMetadata meta = 1;
  repeated SearchResult results = 2;
}
